services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: iafit-backend
    ports:
      - "8001:8001"
    volumes:
      - ./Backend:/app
    working_dir: /app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8001"

  frontend:
    build:
      context: ./Frontend/frontend-rag
      dockerfile: Dockerfile
    container_name: iafit-frontend
    depends_on:
      - backend
    ports:
      - "4200:4200"
    volumes:
      - ./Frontend/frontend-rag:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200"
